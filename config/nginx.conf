user www-data;
worker_processes 2;  # 改为2,匹配你的CPU核心数
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 2048;  # 从768增加到2048
	use epoll;  # 添加epoll,提升Linux性能
	multi_accept on;  # 启用multi_accept
}

http {

	##
	# Basic Settings
	##

	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;  # 添加tcp_nodelay
	types_hash_max_size 2048;
	keepalive_timeout 65;  # 添加keepalive超时
	# server_tokens off;

	# server_names_hash_bucket_size 64;
	# server_name_in_redirect off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	##
	# File Cache Settings (重要!弥补HDD慢的问题)
	##
	
	open_file_cache max=10000 inactive=60s;
	open_file_cache_valid 120s;
	open_file_cache_min_uses 1;
	open_file_cache_errors on;

	##
	# SSL Settings
	##

	ssl_protocols TLSv1.2 TLSv1.3;  # 移除TLSv1和TLSv1.1,只保留安全版本
	ssl_prefer_server_ciphers on;
	ssl_session_cache shared:SSL:10m;  # 添加SSL session缓存
	ssl_session_timeout 10m;

	##
	# Logging Settings
	##

	access_log /var/log/nginx/access.log;
	error_log /var/log/nginx/error.log;

	##
	# Gzip Settings
	##

	gzip on;
	gzip_vary on;
	gzip_proxied any;
	gzip_comp_level 6;
	gzip_buffers 16 8k;
	gzip_http_version 1.1;
	gzip_min_length 256;  # 添加最小压缩长度
	gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/vnd.ms-fontobject application/x-font-ttf font/opentype image/svg+xml;  # 扩展文件类型

	##
	# Virtual Host Configs
	##

	include /etc/nginx/conf.d/*.conf;
	include /etc/nginx/sites-enabled/*;
}


