name: CI

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: admin-server
          # Phase 1 Week 4-5 扩大范围：golangci-lint run ./... 复核全仓库结果是 0 issue，
          # 直接扫全仓库，不再限制路径（见 admin-server/docs/09-ci-cd-and-deployability.md 第 3 节）。
          args: --timeout=5m ./...
      - name: go build
        run: cd admin-server && go build ./...

  unit-test:
    runs-on: ubuntu-latest
    needs: lint-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: go test (unit)
        # 范围严格对齐 08-testing-strategy.md 的口径：只跑领域服务 + repository 层，
        # 不是 go test ./...；集成测试（//go:build integration）默认不会被这条命令带上。
        # services/task/... 是 Phase 2 拆出的 task-rpc（task 域的领域服务/repository 已经
        # 搬到这里，不再在 internal/domain/...、internal/repository/... 下），一并跑。
        # internal/rpcserver/... 是单体内嵌的 TaskCallback server 实现，同理需要跑。
        run: cd admin-server && go test ./internal/domain/... ./internal/repository/... ./internal/rpcserver/... ./services/task/... -race -count=1

  integration-test:
    runs-on: ubuntu-latest
    needs: lint-build
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: admin_test
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping" --health-interval=5s --health-timeout=5s --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping" --health-interval=5s --health-timeout=5s --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: 初始化测试库
        # 顺序与 admin-server/db/services/init-dev-db.sh 保持一致，两处如果后续调整需要同步改。
        run: |
          MYSQL_ROOT_PASSWORD=root MYSQL_DATABASE=admin_test \
            admin-server/db/services/init-dev-db.sh -h127.0.0.1
      - name: go test (integration)
        run: cd admin-server && go test -tags=integration ./... -count=1
        env:
          TEST_MYSQL_DSN: root:root@tcp(127.0.0.1:3306)/admin_test
          TEST_REDIS_ADDR: 127.0.0.1:6379
