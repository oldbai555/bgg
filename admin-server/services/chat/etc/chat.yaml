Name: chat.rpc
ListenOn: 0.0.0.0:8092
Mode: pro

# Telemetry：go-zero 原生能力，zrpc.MustNewServer 检测到该配置非空时自动挂载 gRPC
# metadata 的 trace context 提取/传播。本轮不部署 OTLP collector，Endpoint 无监听方时
# span 静默丢弃、不影响服务启动，重点是 trace-id 会自动打进 pkg/logging 的 JSON 日志，
# 六个服务的 Telemetry.Name 必须互不相同，见 docs/19-observability.md。
Telemetry:
  Name: chat-rpc
  Endpoint: 127.0.0.1:4317
  Sampler: 1.0
  Batcher: otlpgrpc

Mysql:
  DSN: "${CHAT_MYSQL_DSN}" # 指向 admin_chat schema，见 db/services/chat/chat/

# 既用于满足 goctl 生成的 Model 内部 CachedConn 强制要求非空缓存节点，也真正用于
# Redis Streams（stream:chat.user.created 消费者）——与 gateway 共享同一个 Redis 实例
# （缓存/锁/队列不拆分，见 16-rpc-conventions.md 第 6 节）。
ChatRedis:
  Address: "${CHAT_REDIS_ADDRESS}"
  Password: "${CHAT_REDIS_PASSWORD}"

# 回调 iam-rpc 进程内注册的 pkg/iamcallback.IamCallback 服务，取存量用户 ID / 用户展示
# 信息（iam-rpc 拆分前是单体内嵌，见 pkg/iamcallback 包注释）。IAM_CALLBACK_ENDPOINT
# 必须显式设置：本机同进程调试用 127.0.0.1:8081，docker-compose 用服务名 iam:8081。
IamCallbackRpc:
  Endpoints:
    - "${IAM_CALLBACK_ENDPOINT}"
  NonBlock: true
