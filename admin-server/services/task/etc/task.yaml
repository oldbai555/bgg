Name: task.rpc
ListenOn: 0.0.0.0:8090
Mode: pro

# Telemetry：go-zero 原生能力，zrpc.MustNewServer 检测到该配置非空时自动挂载 gRPC
# metadata 的 trace context 提取/传播。本轮不部署 OTLP collector，Endpoint 无监听方时
# span 静默丢弃、不影响服务启动，重点是 trace-id 会自动打进 pkg/logging 的 JSON 日志，
# 六个服务的 Telemetry.Name 必须互不相同，见 docs/19-observability.md。
Telemetry:
  Name: task-rpc
  Endpoint: 127.0.0.1:4317
  Sampler: 1.0
  Batcher: otlpgrpc

Mysql:
  DSN: "${TASK_MYSQL_DSN}" # 指向 admin_task schema，见 db/services/task/task/

TaskRedis:
  Address: "${TASK_REDIS_ADDRESS}" # 与 gateway 共享同一个 Redis 实例（缓存/锁/队列不拆分）
  Password: "${TASK_REDIS_PASSWORD}"

# TaskCallback server 已经整体搬迁到 iam-rpc 进程（见 services/iam/internal/server/
# taskcallbackserver.go，iam-rpc 拆分前是单体内嵌，见 progress.md 对应条目）。
# TASK_CALLBACK_ENDPOINT 必须显式设置：本机同进程调试用 127.0.0.1:8081，docker-compose
# 用服务名 iam:8081。
TaskCallbackRpc:
  Endpoints:
    - "${TASK_CALLBACK_ENDPOINT}"
  NonBlock: true

RecentTaskLimit: 10
