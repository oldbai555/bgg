Name: iam.rpc
ListenOn: 0.0.0.0:8081
Mode: pro

# 指向 "admin" schema——iam+system+monitoring+misc 四个域从单体拆分前就一直存在这个库
# 里（task/sdk/chat/content 早已各自独立成 admin_task/admin_sdk/admin_chat/admin_content），
# 拆分成 iam-rpc 后继续复用同一个库，零数据迁移风险，生产环境（oldbai）无需做任何库改名
# 或数据搬迁。
Mysql:
  DSN: "${IAM_MYSQL_DSN}"

# IamRedis 不叫 Redis：zrpc.RpcServerConf 内嵌字段本身就有一个 Redis（用于可选的 gRPC
# 鉴权），撞名会导致 go-zero 的 conf 解析绑定到错误的结构体，和 task/sdk/chat/content 的
# TaskRedis/SdkRedis/ChatRedis/ContentRedis 同一个坑。与 gateway/其余四个服务共享同一个
# 物理 Redis 实例（缓存/锁/队列不拆分）。
IamRedis:
  Address: "${IAM_REDIS_ADDRESS}"
  Password: "${IAM_REDIS_PASSWORD}"

# JWT 配置：iam-rpc 拆分后 Login/Refresh 的 token 签发/校验整段搬到这里，Issuer/过期时间
# 与拆分前的 etc/admin-api.yaml 保持一致。
JWT:
  AccessSecret: "${JWT_ACCESS_SECRET}"
  RefreshSecret: "${JWT_REFRESH_SECRET}"
  AccessExpire: 7200        # 秒
  RefreshExpire: 604800     # 秒
  Issuer: "postapoc-admin"

# bcrypt 配置
Bcrypt:
  Cost: 10

# SdkRpc 连到 sdk-rpc 的 zrpc client 配置：原单体内嵌 TaskCallback server 的
# fetchSdkCallLog 分支回调 sdk-rpc.SdkCallLogExport，这里原样保留（见
# internal/rpcserver/taskcallback/server.go 搬迁前的实现）。SDK_RPC_ENDPOINT 必须显式
# 设置：本机同进程调试用 127.0.0.1:8091，docker-compose 用服务名 sdk:8091。
SdkRpc:
  Endpoints:
    - "${SDK_RPC_ENDPOINT}"
  NonBlock: true

# ChatRpc 连到 chat-rpc 的 zrpc client 配置：task 通知消费者（原单体
# internal/consumer/task_notification_consumer.go，现原样搬到
# services/iam/internal/consumer/）推送 WS 通知时回调 chat-rpc.PushToUser。
# CHAT_RPC_ENDPOINT 必须显式设置：本机同进程调试用 127.0.0.1:8092，docker-compose
# 用服务名 chat:8092。
ChatRpc:
  Endpoints:
    - "${CHAT_RPC_ENDPOINT}"
  NonBlock: true
