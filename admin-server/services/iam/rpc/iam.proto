// MonitorStatus（CPU/内存/磁盘/网络）读的是 iam-rpc 进程自己所在机器的资源，不是 gateway
// 所在机器——拆分后这是一处有意的语义变化（原来单体只有一个进程，读到的和 API 网关是
// 同一台机器；现在读到的是 iam-rpc 容器/进程的资源），已记入 progress.md，不是 bug。
message MonitorStatusResponse {
  double cpu_usage = 1;
  int32 cpu_cores = 2;
  uint64 memory_total = 3;
  uint64 memory_used = 4;
  uint64 memory_available = 5;
  double memory_usage = 6;
  uint64 disk_total = 7;
  uint64 disk_used = 8;
  uint64 disk_available = 9;
  double disk_usage = 10;
  uint64 network_bytes_sent = 11;
  uint64 network_bytes_recv = 12;
  uint64 network_packets_sent = 13;
  uint64 network_packets_recv = 14;
}

// ---------- Demo / DailyShortSentence（misc 域，标准 CRUD） ----------

message DemoItem {
  uint64 id = 1;
  string name = 2;
  int64 status = 3;
  int64 created_at = 4;
}

message DemoCreateRequest {
  string name = 1;
  int64 status = 2;
}

message DemoUpdateRequest {
  uint64 id = 1;
  string name = 2;
  int64 status = 3;
}

message DemoDeleteRequest {
  uint64 id = 1;
}

message DemoListRequest {
  int64 page = 1;
  int64 page_size = 2;
  string name = 3;
}

message DemoListResponse {
  int64 total = 1;
  repeated DemoItem list = 2;
}

message DailyShortSentenceItem {
  uint64 id = 1;
  int64 sentence_type = 2;
  string content = 3;
  string img = 4;
  string literature_author = 5;
  string convert_img = 6;
  int64 created_at = 7;
  int64 updated_at = 8;
}

message DailyShortSentenceCreateRequest {
  int64 sentence_type = 1;
  string content = 2;
  string img = 3;
  string literature_author = 4;
  string convert_img = 5;
}

message DailyShortSentenceUpdateRequest {
  uint64 id = 1;
  int64 sentence_type = 2;
  string content = 3;
  string img = 4;
  string literature_author = 5;
  string convert_img = 6;
}

message DailyShortSentenceDeleteRequest {
  uint64 id = 1;
}

message DailyShortSentenceListRequest {
  int64 page = 1;
  int64 page_size = 2;
  string keyword = 3;
  int64 sentence_type = 4;
}

message DailyShortSentenceListResponse {
  int64 total = 1;
  repeated DailyShortSentenceItem list = 2;
}

service Iam {
  // 权限校验（GetUserProfile 等见 pkg/iamcallback.IamCallback，同一进程内另注册）
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);

  // Gateway 基础设施
  rpc CheckApiEnabled(CheckApiEnabledRequest) returns (CheckApiEnabledResponse);
  rpc SyncApiRoutes(SyncApiRoutesRequest) returns (Empty);
  rpc BatchRecordOperationLog(BatchRecordOperationLogRequest) returns (Empty);
  rpc RecordPerformanceLog(RecordPerformanceLogRequest) returns (Empty);
  rpc FileRegister(FileRegisterRequest) returns (FileRegisterResponse);
  rpc FileGetMeta(FileGetMetaRequest) returns (FileGetMetaResponse);
  rpc Ping(Empty) returns (PingResponse);

  // Auth
  rpc Login(LoginRequest) returns (TokenPair);
  rpc LoginFeishu(LoginFeishuRequest) returns (TokenPair);
  rpc Refresh(RefreshRequest) returns (TokenPair);
  rpc Logout(LogoutRequest) returns (Empty);
  rpc Profile(ProfileRequest) returns (ProfileResponse);
  rpc ProfileUpdate(ProfileUpdateRequest) returns (Empty);
  rpc PasswordChange(PasswordChangeRequest) returns (Empty);

  // User / Role / Permission / Menu / Department / Api
  rpc UserCreate(UserCreateRequest) returns (Empty);
  rpc UserUpdate(UserUpdateRequest) returns (Empty);
  rpc UserDelete(UserDeleteRequest) returns (Empty);
  rpc UserList(UserListRequest) returns (UserListResponse);

  rpc RoleCreate(RoleCreateRequest) returns (Empty);
  rpc RoleUpdate(RoleUpdateRequest) returns (Empty);
  rpc RoleDelete(RoleDeleteRequest) returns (Empty);
  rpc RoleList(RoleListRequest) returns (RoleListResponse);

  rpc PermissionCreate(PermissionCreateRequest) returns (Empty);
  rpc PermissionUpdate(PermissionUpdateRequest) returns (Empty);
  rpc PermissionDelete(PermissionDeleteRequest) returns (Empty);
  rpc PermissionList(PermissionListRequest) returns (PermissionListResponse);

  rpc MenuCreate(MenuCreateRequest) returns (Empty);
  rpc MenuUpdate(MenuUpdateRequest) returns (Empty);
  rpc MenuDelete(MenuDeleteRequest) returns (Empty);
  rpc MenuTree(Empty) returns (MenuTreeResponse);
  rpc MenuMyTree(MenuMyTreeRequest) returns (MenuTreeResponse);

  rpc DepartmentCreate(DepartmentCreateRequest) returns (Empty);
  rpc DepartmentUpdate(DepartmentUpdateRequest) returns (Empty);
  rpc DepartmentDelete(DepartmentDeleteRequest) returns (Empty);
  rpc DepartmentTree(Empty) returns (DepartmentTreeResponse);

  rpc ApiCreate(ApiCreateRequest) returns (Empty);
  rpc ApiUpdate(ApiUpdateRequest) returns (Empty);
  rpc ApiDelete(ApiDeleteRequest) returns (Empty);
  rpc ApiList(ApiListRequest) returns (ApiListResponse);

  // RBAC 关联关系
  rpc PermissionMenuList(PermissionMenuListRequest) returns (PermissionMenuListResponse);
  rpc PermissionMenuUpdate(PermissionMenuUpdateRequest) returns (Empty);
  rpc PermissionApiList(PermissionApiListRequest) returns (PermissionApiListResponse);
  rpc PermissionApiUpdate(PermissionApiUpdateRequest) returns (Empty);
  rpc UserRoleList(UserRoleListRequest) returns (UserRoleListResponse);
  rpc UserRoleUpdate(UserRoleUpdateRequest) returns (Empty);
  rpc RolePermissionList(RolePermissionListRequest) returns (RolePermissionListResponse);
  rpc RolePermissionUpdate(RolePermissionUpdateRequest) returns (Empty);

  // Config / Dict
  rpc ConfigCreate(ConfigCreateRequest) returns (Empty);
  rpc ConfigUpdate(ConfigUpdateRequest) returns (Empty);
  rpc ConfigDelete(ConfigDeleteRequest) returns (Empty);
  rpc ConfigList(ConfigListRequest) returns (ConfigListResponse);
  rpc ConfigGet(ConfigGetRequest) returns (ConfigGetResponse);

  rpc DictTypeCreate(DictTypeCreateRequest) returns (Empty);
  rpc DictTypeUpdate(DictTypeUpdateRequest) returns (Empty);
  rpc DictTypeDelete(DictTypeDeleteRequest) returns (Empty);
  rpc DictTypeList(DictTypeListRequest) returns (DictTypeListResponse);

  rpc DictItemCreate(DictItemCreateRequest) returns (Empty);
  rpc DictItemUpdate(DictItemUpdateRequest) returns (Empty);
  rpc DictItemDelete(DictItemDeleteRequest) returns (Empty);
  rpc DictItemList(DictItemListRequest) returns (DictItemListResponse);

  rpc DictGet(DictGetRequest) returns (DictGetResponse);
  rpc DictBatchGet(DictBatchGetRequest) returns (DictBatchGetResponse);

  // File
  rpc FileCreate(FileCreateRequest) returns (Empty);
  rpc FileUpdate(FileUpdateRequest) returns (Empty);
  rpc FileDelete(FileDeleteRequest) returns (Empty);
  rpc FileList(FileListRequest) returns (FileListResponse);

  // Notice / Notification
  rpc NoticeCreate(NoticeCreateRequest) returns (Empty);
  rpc NoticeUpdate(NoticeUpdateRequest) returns (Empty);
  rpc NoticeDelete(NoticeDeleteRequest) returns (Empty);
  rpc NoticeList(NoticeListRequest) returns (NoticeListResponse);

  rpc NotificationList(NotificationListRequest) returns (NotificationListResponse);
  rpc NotificationRead(NotificationReadRequest) returns (Empty);
  rpc NotificationReadAll(NotificationReadAllRequest) returns (Empty);
  rpc NotificationClearRead(NotificationClearReadRequest) returns (Empty);
  rpc NotificationDelete(NotificationDeleteRequest) returns (Empty);

  // OperationLog / LoginLog / PerformanceLog / AuditLog（列表/详情/统计；导出见
  // services/task 的 GenericExportExecutor，走 pkg/taskcallback，不在本服务）
  rpc OperationLogList(OperationLogListRequest) returns (OperationLogListResponse);
  rpc OperationLogDetail(OperationLogDetailRequest) returns (OperationLogItem);

  rpc LoginLogList(LoginLogListRequest) returns (LoginLogListResponse);
  rpc LoginLogDetail(LoginLogDetailRequest) returns (LoginLogItem);
  rpc LoginLogStats(Empty) returns (LoginLogStatsResponse);

  rpc PerformanceLogList(PerformanceLogListRequest) returns (PerformanceLogListResponse);

  rpc AuditLogList(AuditLogListRequest) returns (AuditLogListResponse);
  rpc AuditLogDetail(AuditLogDetailRequest) returns (AuditLogItem);

  // Metric / Monitor
  rpc MetricReport(MetricReportRequest) returns (Empty);
  rpc MetricStats(MetricStatsRequest) returns (MetricStatsResponse);
  rpc MonitorStats(Empty) returns (MonitorStatsResponse);
  rpc MonitorStatus(Empty) returns (MonitorStatusResponse);

  // Demo / DailyShortSentence
  rpc DemoCreate(DemoCreateRequest) returns (Empty);
  rpc DemoUpdate(DemoUpdateRequest) returns (Empty);
  rpc DemoDelete(DemoDeleteRequest) returns (Empty);
  rpc DemoList(DemoListRequest) returns (DemoListResponse);

  rpc DailyShortSentenceCreate(DailyShortSentenceCreateRequest) returns (Empty);
  rpc DailyShortSentenceUpdate(DailyShortSentenceUpdateRequest) returns (Empty);
  rpc DailyShortSentenceDelete(DailyShortSentenceDeleteRequest) returns (Empty);
  rpc DailyShortSentenceList(DailyShortSentenceListRequest) returns (DailyShortSentenceListResponse);
}
