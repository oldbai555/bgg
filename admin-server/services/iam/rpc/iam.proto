syntax = "proto3";

package iam;

option go_package = "./iam";

// iam-rpc 承载 Phase 1 分组约定里的 iam + system + monitoring + misc 四个子域
// （db/services/iam/ 下的全部模块），是 Phase 2 五个服务里最后拆分、也是唯一被其余
// 四个服务（task/sdk/chat/content）依赖做权限校验/用户资料查询的服务。
//
// 本 proto 只承担"新增的 Iam 服务"本身。pkg/taskcallback.TaskCallback、
// pkg/iamcallback.IamCallback 两个已经在 task-rpc/chat-rpc/content-rpc 拆分时
// 定型的独立 proto 契约保持不变（其余服务的 client 代码不用动），服务端实现原样
// 从单体的 internal/rpcserver/{taskcallback,iamcallback}/ 搬进本服务的
// internal/server/，和 Iam 服务一起注册在同一个 zrpc.Server 上（见 iam.go）。

message Empty {}

// ---------- 权限校验 / 用户资料（16-rpc-conventions.md 第 4 节基础契约） ----------

message CheckPermissionRequest {
  uint64 user_id = 1;
  string method = 2;
  string path = 3;
}

message CheckPermissionResponse {
  bool allowed = 1;
  string reason = 2;
}

// GetUserProfile/BatchGetUserProfiles/FindActiveUserChunk/RecordAuditLog/
// IsTokenBlacklisted 不在这个 proto 里：chat-rpc/content-rpc 已经在各自拆分时通过
// pkg/iamcallback.IamCallback 这个独立契约实现了等价能力（且是真实在用的，
// BatchGetUserProfiles 反而从未被任何服务调用过——只是 16-rpc-conventions.md 第 4 节
// 早期草稿设想的方法，实际落地走的是 IamCallback 这条路）。iam-rpc 拆分时把
// internal/rpcserver/iamcallback/ 的服务端实现原样搬进 services/iam/internal/server/，
// 和 pkg/taskcallback 的服务端实现一起注册在本服务同一个 zrpc.Server 上（见 iam.go），
// 两个 proto 契约本身不变，chat-rpc/content-rpc/task-rpc 侧代码零改动，只改配置里的
// 回调地址指向 iam-rpc。IsTokenBlacklisted 同理不需要：黑名单检查直连共享 Redis，
// 见 16-rpc-conventions.md 第 6 节。

// ---------- Gateway 基础设施回调（中间件切换成 RPC 后新增，16/18 文档草稿未覆盖） ----------

// CheckApiEnabled 供 gateway ApiEnabledMiddleware：判断某个 method+path 对应的
// admin_api 记录是否存在且已启用。
message CheckApiEnabledRequest {
  string method = 1;
  string path = 2;
}

message CheckApiEnabledResponse {
  bool exists = 1;
  bool enabled = 2;
}

// SyncApiRoutes 供 gateway 启动时把 rest.Server 已注册的路由同步进 admin_api 表
// （原 admin.go 的 syncRoutesToAdminAPI，直连 AdminApiModel；拆分后 gateway 没有
// 直连数据库的能力，改成一次性批量 RPC，逻辑原样保留在 iam-rpc 侧）。
message ApiRouteRef {
  string method = 1;
  string path = 2;
}

message SyncApiRoutesRequest {
  repeated ApiRouteRef routes = 1;
}

// BatchRecordOperationLog 供 gateway 的 OperationLogMiddleware/
// PublicOperationLogMiddleware：两个中间件各自在进程内缓冲批量后调用一次。
message OperationLogEntry {
  uint64 user_id = 1;
  string username = 2;
  string operation_type = 3;
  string operation_object = 4;
  string method = 5;
  string path = 6;
  string request_params = 7;
  int64 response_code = 8;
  string response_msg = 9;
  string ip_address = 10;
  string user_agent = 11;
  int64 duration = 12;
}

message BatchRecordOperationLogRequest {
  repeated OperationLogEntry logs = 1;
}

// RecordPerformanceLog 供 gateway 的 PerformanceMiddleware（仅慢接口/错误请求才调用，
// 原语义不变，见 internal/middleware/performancemiddleware.go）。
message RecordPerformanceLogRequest {
  uint64 user_id = 1;
  string username = 2;
  string method = 3;
  string path = 4;
  int64 status_code = 5;
  int64 duration = 6;
  int64 is_slow = 7;
  int64 slow_threshold = 8;
  string ip_address = 9;
  string user_agent = 10;
  string error_msg = 11;
}

// FileRegister / FileGetMeta 供 gateway 的 FileUpload/FileDownload：文件字节继续由
// gateway 直接读写共享 uploads 卷（和 task/content 拆分时的既有做法一致），只有
// admin_file 元数据的登记/查询走 RPC（该表物理属于 iam）。
message FileRegisterRequest {
  string name = 1;          // MD5 + 扩展名
  string original_name = 2;
  string path = 3;          // 代理访问路径，如 /api/v1/files/uploads/<name>
  string base_url = 4;
  uint64 size = 5;
  string mime_type = 6;
  string ext = 7;
}

message FileRegisterResponse {
  uint64 id = 1;
  string name = 2;
  string original_name = 3;
  string path = 4;
  string base_url = 5;
  uint64 size = 6;
  string mime_type = 7;
  string ext = 8;
  bool already_existed = 9; // true 表示按 MD5 命中已有记录，未新建
}

message FileGetMetaRequest {
  uint64 id = 1;
}

message FileGetMetaResponse {
  bool exists = 1;
  string original_name = 2;
  string mime_type = 3;
  string path = 4; // 代理访问路径，gateway 自己转换成 uploads 卷内的文件系统路径
}

// Ping 供 gateway /api/v1/ping 探测 iam-rpc 是否可达（gateway 自身不再直连 MySQL，
// 原来的 "SELECT 1" 数据库探活改成这个最小 RPC；Redis 探活 gateway 直接查共享 Redis）。
message PingResponse {
  bool ok = 1;
}

