# 本地开发 / 集成测试用的 compose 编排：一条命令拉起 MySQL + Redis + app。
# JWT_* 默认值仅供本地开发（见 admin.go 的 fail-fast 检查、docs/01-architecture-target.md A.5），
# 生产环境必须通过部署环境的真实环境变量覆盖，不能沿用这里的默认值。
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-devroot}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-admin}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/db:ro
      # 00-init.sh 内部跑 db/services/init-dev-db.sh，第一步就建 iam+system+monitoring+misc
      # 的表——iam-rpc 复用这个已经存在的 "admin" schema，不需要单独的 init-iam-db.sh。
      - ./db/docker-init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
      - ./db/services/init-task-db.sh:/docker-entrypoint-initdb.d/01-init-task-db.sh:ro
      - ./db/services/init-sdk-db.sh:/docker-entrypoint-initdb.d/02-init-sdk-db.sh:ro
      - ./db/services/init-chat-db.sh:/docker-entrypoint-initdb.d/03-init-chat-db.sh:ro
      - ./db/services/init-content-db.sh:/docker-entrypoint-initdb.d/04-init-content-db.sh:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-devroot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      iam:
        condition: service_started
    environment:
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local-dev-access-secret-not-for-prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-dev-refresh-secret-not-for-prod}
      # iam-rpc 的服务名:端口，见 services/iam/ 和 18-service-extraction-runbook.md。
      # gateway 不再直连任何 MySQL，Auth/Permission/ApiEnabled/OperationLog/Performance
      # 5 个中间件和全部 iam/system/monitoring/misc logic 都通过这个 client 调用。
      IAM_RPC_ENDPOINT: iam:8081
      # IamCallback（RBAC 审计日志写入）走同一个 iam-rpc 地址，只是调用不同的 gRPC service。
      IAM_CALLBACK_RPC_ENDPOINT: iam:8081
      # task-rpc 的服务名:端口，见 services/task/ 和 16-rpc-conventions.md 第 5 节。
      TASK_RPC_ENDPOINT: task:8090
      # sdk-rpc 的服务名:端口，见 services/sdk/。
      SDK_RPC_ENDPOINT: sdk:8091
      # chat-rpc 的服务名:端口，见 services/chat/。
      CHAT_RPC_ENDPOINT: chat:8092
      # content-rpc 的服务名:端口，见 services/content/。
      CONTENT_RPC_ENDPOINT: content:8093
    # admin.go 强制要求 -redis-config 指向的 JSON 文件存在（MergeExternalConfig 找不到文件
    # 直接报错退出），etc/dev-redis.json 是仅供本地 compose 使用的开发期配置（host 指向本
    # compose 内的服务名 redis），生产环境必须换成 /etc/work/ 下的真实文件。iam+system+
    # monitoring+misc 域拆分成 iam-rpc 后，gateway 不再直连 MySQL，不再需要 -mysql-config。
    command: ["./admin", "-f", "etc/admin-api.yaml", "-redis-config", "etc/dev-redis.json"]
    ports:
      - "20000:20000"   # 需与 etc/admin-api.yaml 的 Port 一致
    volumes:
      - uploads:/app/uploads   # 导出文件的下载代理路径读这个卷，见 task 服务同名挂载

  iam:
    build:
      context: .
      dockerfile: services/iam/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local-dev-access-secret-not-for-prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-dev-refresh-secret-not-for-prod}
      # 复用 "admin" schema（iam+system+monitoring+misc 从单体拆分前就一直在这个库里），
      # 不是新建的 admin_iam，零数据迁移风险，见 services/iam/etc/iam.yaml 顶部注释。
      IAM_MYSQL_DSN: "root:${MYSQL_ROOT_PASSWORD:-devroot}@tcp(mysql:3306)/${MYSQL_DATABASE:-admin}?charset=utf8mb4&parseTime=true&loc=Local"
      IAM_REDIS_ADDRESS: redis:6379
      IAM_REDIS_PASSWORD: ""
      # sdk-rpc 的服务名:端口——原单体内嵌 TaskCallback server 的 fetchSdkCallLog 分支
      # 回调用，见 services/iam/etc/iam.yaml。
      SDK_RPC_ENDPOINT: sdk:8091
      # chat-rpc 的服务名:端口——task 通知消费者推送 WS 通知时回调用。
      CHAT_RPC_ENDPOINT: chat:8092
    ports:
      - "8081:8081"   # Iam + TaskCallback + IamCallback 三个 gRPC service 同一个端口

  task:
    build:
      context: .
      dockerfile: services/task/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      iam:
        condition: service_started
    environment:
      TASK_MYSQL_DSN: "root:${MYSQL_ROOT_PASSWORD:-devroot}@tcp(mysql:3306)/admin_task?charset=utf8mb4&parseTime=true&loc=Local"
      TASK_REDIS_ADDRESS: redis:6379
      TASK_REDIS_PASSWORD: ""
      # TaskCallback server 现在整体搬进了 iam-rpc 进程，见 etc/iam.yaml 顶部注释；
      # 不再指向 gateway（app 容器）。
      TASK_CALLBACK_ENDPOINT: iam:8081
    ports:
      - "8090:8090"
    volumes:
      # 和 app 共享同一份物理导出文件——task-rpc 生成 CSV，gateway 的
      # /api/v1/files/uploads/* 路由负责对外提供下载，见 17-async-eventing.md 发现 3。
      - uploads:/app/uploads

  sdk:
    build:
      context: .
      dockerfile: services/sdk/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SDK_MYSQL_DSN: "root:${MYSQL_ROOT_PASSWORD:-devroot}@tcp(mysql:3306)/admin_sdk?charset=utf8mb4&parseTime=true&loc=Local"
      SDK_REDIS_ADDRESS: redis:6379
      SDK_REDIS_PASSWORD: ""
    ports:
      - "8091:8091"

  chat:
    build:
      context: .
      dockerfile: services/chat/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      iam:
        condition: service_started
    environment:
      CHAT_MYSQL_DSN: "root:${MYSQL_ROOT_PASSWORD:-devroot}@tcp(mysql:3306)/admin_chat?charset=utf8mb4&parseTime=true&loc=Local"
      CHAT_REDIS_ADDRESS: redis:6379
      CHAT_REDIS_PASSWORD: ""
      # IamCallback server 现在整体搬进了 iam-rpc 进程，见 etc/iam.yaml 顶部注释；
      # 不再指向 gateway（app 容器）。
      IAM_CALLBACK_ENDPOINT: iam:8081
    ports:
      - "8092:8092"

  content:
    build:
      context: .
      dockerfile: services/content/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      iam:
        condition: service_started
    environment:
      CONTENT_MYSQL_DSN: "root:${MYSQL_ROOT_PASSWORD:-devroot}@tcp(mysql:3306)/admin_content?charset=utf8mb4&parseTime=true&loc=Local"
      CONTENT_REDIS_ADDRESS: redis:6379
      CONTENT_REDIS_PASSWORD: ""
      # IamCallback server 现在整体搬进了 iam-rpc 进程，供 PublicBlogAuthorInfo/
      # BlogArticleAudit/BlogArticleAuditUnpublish 回调，见 etc/iam.yaml 顶部注释；
      # 不再指向 gateway（app 容器）。
      IAM_CALLBACK_ENDPOINT: iam:8081
    ports:
      - "8093:8093"

volumes:
  mysql_data:
  uploads:
