Name: admin-api
Host: 0.0.0.0
Port: 20000
Timeout: 30000  # 30秒超时（毫秒），避免 m3u8 代理请求超时

# Telemetry：go-zero 原生能力，rest.MustNewServer 检测到该配置非空时自动挂载 HTTP
# traceparent 传播（本服务是入口，负责生成 trace-id）+ span 创建。本轮不部署 OTLP
# collector，Endpoint 无监听方时 span 静默丢弃、不影响服务启动，重点是 trace-id 会
# 自动打进 pkg/logging 的 JSON 日志（logx.WithContext(ctx) 自动读取），六个服务的
# Telemetry.Name 必须互不相同，见 docs/19-observability.md。
Telemetry:
  Name: gateway
  Endpoint: 127.0.0.1:4317
  Sampler: 1.0
  Batcher: otlpgrpc

# iam-rpc（services/iam/）的 zrpc client 配置。iam+system+monitoring+misc 四个域已拆分成
# 独立服务，gateway 侧全部相关 logic 和 5 个中间件（Auth/Permission/ApiEnabled/
# OperationLog/Performance）都通过这个 client 调用。TaskCallback/IamCallback 两个
# zrpc server 也已经整体搬进 iam-rpc 进程（不再由 gateway 内嵌承载），task-rpc/chat-rpc/
# content-rpc 回调时直连 iam-rpc，不再连 gateway。IAM_RPC_ENDPOINT 必须显式设置：
# 本机同进程调试用 127.0.0.1:8081，docker-compose 用服务名 iam:8081。
IamRpc:
  Endpoints:
    - "${IAM_RPC_ENDPOINT}"
  NonBlock: true

# IamCallbackRpc 连到 iam-rpc 同一进程内注册的 pkg/iamcallback.IamCallback 服务
# （RBAC 变更审计日志写入，pkg/audit.RecordAuditLog 用它）。和 IamRpc 指向同一个
# iam-rpc 地址，只是调用不同的 gRPC service。
IamCallbackRpc:
  Endpoints:
    - "${IAM_CALLBACK_RPC_ENDPOINT}"
  NonBlock: true

# task-rpc（services/task/）的 zrpc client 配置。task 域已拆分成独立服务，见
# 16-rpc-conventions.md 第 5 节"gateway 变薄机制"。初期用静态 Endpoints，不引入 etcd。
# TASK_RPC_ENDPOINT 必须显式设置（和 JWT_ACCESS_SECRET 一样走 fail-fast，不给静默默认值）：
# 本机同进程调试用 127.0.0.1:8090，docker-compose 用服务名 task:8090。
TaskRpc:
  Endpoints:
    - "${TASK_RPC_ENDPOINT}"
  NonBlock: true

# sdk-rpc（services/sdk/）的 zrpc client 配置。sdk 域已拆分成独立服务，11 个
# SdkApiKey/SdkInterface/SdkCallLog logic 和 SDKAuthMiddleware/SDKRateLimitMiddleware/
# SDKCallLogMiddleware 三个中间件都通过这个 client 调用。SDK_RPC_ENDPOINT 必须显式设置：
# 本机同进程调试用 127.0.0.1:8091，docker-compose 用服务名 sdk:8091。
SdkRpc:
  Endpoints:
    - "${SDK_RPC_ENDPOINT}"
  NonBlock: true

# chat-rpc（services/chat/）的 zrpc client 配置。chat 域已拆分成独立服务，11 个
# Chat*/ChatGroup*/ChatMessage* logic 和 WS↔gRPC 桥接 handler
# （internal/handler/chat/chatwshandler.go）都通过这个 client 调用。CHAT_RPC_ENDPOINT
# 必须显式设置：本机同进程调试用 127.0.0.1:8092，docker-compose 用服务名 chat:8092。
ChatRpc:
  Endpoints:
    - "${CHAT_RPC_ENDPOINT}"
  NonBlock: true

# content-rpc（services/content/）的 zrpc client 配置。blog+video 域已拆分成独立服务，
# 34 个 Blog*/PublicBlog* logic + 6 个 Video*/PublicVideo* logic 都通过这个 client 调用
# （M3u8Proxy/VideoCollectOptions 不访问域数据，继续留在 gateway）。CONTENT_RPC_ENDPOINT
# 必须显式设置：本机同进程调试用 127.0.0.1:8093，docker-compose 用服务名 content:8093。
ContentRpc:
  Endpoints:
    - "${CONTENT_RPC_ENDPOINT}"
  NonBlock: true

# JWT 配置
JWT:
  AccessSecret: "${JWT_ACCESS_SECRET}"
  RefreshSecret: "${JWT_REFRESH_SECRET}"
  AccessExpire: 7200        # 秒
  RefreshExpire: 604800     # 秒
  Issuer: "postapoc-admin"

# bcrypt 配置
Bcrypt:
  Cost: 10

# 限流配置（从 etc/middleware.yaml 读取，如果文件不存在则使用此配置）
RateLimit:
  enabled: true
  ipLimit:
    enabled: true
    quota: 100    # 每个IP每秒最多100个请求
    period: 1     # 时间窗口（秒）
  userLimit:
    enabled: true
    quota: 200   # 每个用户每秒最多200个请求
    period: 1    # 时间窗口（秒）
  apiLimit:
    enabled: true
    quota: 50    # 每个接口每秒最多50个请求
    period: 1    # 时间窗口（秒）
  globalLimit:
    enabled: true
    quota: 1000  # 全局每秒最多1000个请求
    period: 1    # 时间窗口（秒）
