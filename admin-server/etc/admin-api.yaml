Name: admin-api
Host: 0.0.0.0
Port: 20000
Timeout: 30000  # 30秒超时（毫秒），避免 m3u8 代理请求超时

# TaskCallback zrpc server：与上面的 REST server 并存，供 services/task/（task-rpc）
# 回调取导出数据/登记导出文件。监听 0.0.0.0 而不是 127.0.0.1——docker-compose 场景下
# task 容器要能通过服务名 app:9001 连进来，127.0.0.1 只在同一个网络命名空间内可达。
TaskCallbackRpc:
  Name: admin-api.taskcallback
  ListenOn: 0.0.0.0:9001
  Mode: pro

# IamCallback zrpc server：与上面的 REST server 并存，供 services/chat/（chat-rpc）
# 回调枚举存量用户 / 取用户展示信息。iam 域还没拆分成独立服务前的临时方案，和
# TaskCallbackRpc 同一个模式，监听 0.0.0.0 让 docker-compose 场景下的 chat 容器能连进来。
IamCallbackRpc:
  Name: admin-api.iamcallback
  ListenOn: 0.0.0.0:9002
  Mode: pro

# task-rpc（services/task/）的 zrpc client 配置。task 域已拆分成独立服务，见
# 16-rpc-conventions.md 第 5 节"gateway 变薄机制"。初期用静态 Endpoints，不引入 etcd。
# TASK_RPC_ENDPOINT 必须显式设置（和 JWT_ACCESS_SECRET 一样走 fail-fast，不给静默默认值）：
# 本机同进程调试用 127.0.0.1:8090，docker-compose 用服务名 task:8090。
TaskRpc:
  Endpoints:
    - "${TASK_RPC_ENDPOINT}"
  NonBlock: true

# sdk-rpc（services/sdk/）的 zrpc client 配置。sdk 域已拆分成独立服务，11 个
# SdkApiKey/SdkInterface/SdkCallLog logic 和 SDKAuthMiddleware/SDKRateLimitMiddleware/
# SDKCallLogMiddleware 三个中间件都通过这个 client 调用。SDK_RPC_ENDPOINT 必须显式设置：
# 本机同进程调试用 127.0.0.1:8091，docker-compose 用服务名 sdk:8091。
SdkRpc:
  Endpoints:
    - "${SDK_RPC_ENDPOINT}"
  NonBlock: true

# chat-rpc（services/chat/）的 zrpc client 配置。chat 域已拆分成独立服务，11 个
# Chat*/ChatGroup*/ChatMessage* logic 和 WS↔gRPC 桥接 handler
# （internal/handler/chat/chatwshandler.go）都通过这个 client 调用。CHAT_RPC_ENDPOINT
# 必须显式设置：本机同进程调试用 127.0.0.1:8092，docker-compose 用服务名 chat:8092。
ChatRpc:
  Endpoints:
    - "${CHAT_RPC_ENDPOINT}"
  NonBlock: true

# content-rpc（services/content/）的 zrpc client 配置。blog+video 域已拆分成独立服务，
# 34 个 Blog*/PublicBlog* logic + 6 个 Video*/PublicVideo* logic 都通过这个 client 调用
# （M3u8Proxy/VideoCollectOptions 不访问域数据，继续留在 gateway）。CONTENT_RPC_ENDPOINT
# 必须显式设置：本机同进程调试用 127.0.0.1:8093，docker-compose 用服务名 content:8093。
ContentRpc:
  Endpoints:
    - "${CONTENT_RPC_ENDPOINT}"
  NonBlock: true

# JWT 配置
JWT:
  AccessSecret: "${JWT_ACCESS_SECRET}"
  RefreshSecret: "${JWT_REFRESH_SECRET}"
  AccessExpire: 7200        # 秒
  RefreshExpire: 604800     # 秒
  Issuer: "postapoc-admin"

# bcrypt 配置
Bcrypt:
  Cost: 10

# 限流配置（从 etc/middleware.yaml 读取，如果文件不存在则使用此配置）
RateLimit:
  enabled: true
  ipLimit:
    enabled: true
    quota: 100    # 每个IP每秒最多100个请求
    period: 1     # 时间窗口（秒）
  userLimit:
    enabled: true
    quota: 200   # 每个用户每秒最多200个请求
    period: 1    # 时间窗口（秒）
  apiLimit:
    enabled: true
    quota: 50    # 每个接口每秒最多50个请求
    period: 1    # 时间窗口（秒）
  globalLimit:
    enabled: true
    quota: 1000  # 全局每秒最多1000个请求
    period: 1    # 时间窗口（秒）
