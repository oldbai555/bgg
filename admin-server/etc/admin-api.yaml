Name: admin-api
Host: 0.0.0.0
Port: 8888
BaseURL: "http://localhost:8888"  # API 基础 URL，用于生成文件完整访问路径（生产环境需要修改为实际域名）

# 注意：MySQL 和 Redis 配置从外部文件读取
# MySQL: /etc/work/mysql.json（必须存在）
# Redis: /etc/work/redis.json（必须存在）

# JWT 配置
JWT:
  AccessSecret: "replace-with-secure-access-secret"
  RefreshSecret: "replace-with-secure-refresh-secret"
  AccessExpire: 7200        # 秒
  RefreshExpire: 604800     # 秒
  Issuer: "postapoc-admin"

# bcrypt 配置
Bcrypt:
  Cost: 10

# 限流配置（从 etc/middleware.yaml 读取，如果文件不存在则使用此配置）
RateLimit:
  enabled: true
  ipLimit:
    enabled: true
    quota: 100    # 每个IP每秒最多100个请求
    period: 1     # 时间窗口（秒）
  userLimit:
    enabled: true
    quota: 200   # 每个用户每秒最多200个请求
    period: 1    # 时间窗口（秒）
  apiLimit:
    enabled: true
    quota: 50    # 每个接口每秒最多50个请求
    period: 1    # 时间窗口（秒）
  globalLimit:
    enabled: true
    quota: 1000  # 全局每秒最多1000个请求
    period: 1    # 时间窗口（秒）
