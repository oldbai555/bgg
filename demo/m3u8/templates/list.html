<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U8视频列表</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 {
            font-size: 3em;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #666; font-size: 1.2em; }

        /* 搜索框 */
        .search-section {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
            position: relative;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .search-section input {
            width: 100%;
            padding: 12px 40px 12px 18px;
            border: 2px solid #667eea;
            border-radius: 25px;
            font-size: 1em;
        }
        .clear-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #999;
            display: none;
        }
        .clear-btn:hover { color: #333; }

        /* 视频卡片 */
        .video-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        .video-card {
            position: relative;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            aspect-ratio: 16/9;
            background: #f0f0f0;
        }
        .video-thumbnail { width: 100%; height: 100%; object-fit: cover; }
        .video-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 30%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex; align-items: flex-end; padding: 10px;
        }
        .video-title {
            color: white;
            font-weight: 600;
            font-size: 1em;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
            width: 100%;
        }

        /* 分页 */
        .pagination { margin-top: 30px; text-align: center; }
        .pagination button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 14px;
            margin: 0 4px;
            border-radius: 6px;
            cursor: pointer;
        }
        .pagination button.active { background: #333; }

        /* 跳转 */
        .page-jump { margin-top: 15px; text-align: center; }
        .page-jump input {
            width: 60px; padding: 5px; text-align: center;
            border: 1px solid #ccc; border-radius: 5px;
        }
        .page-jump button {
            margin-left: 8px; padding: 6px 12px;
            border: none; background: #667eea;
            color: #fff; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎬 M3U8视频列表</h1>
        <p>点击任意视频即可开始观看</p>
    </div>

    <!-- 搜索 -->
    <div class="search-section">
        <input type="text" id="searchInput" placeholder="🔍 搜索您想观看的视频..." oninput="searchVideos()">
        <button class="clear-btn" id="clearBtn" onclick="clearSearch()">❌</button>
    </div>

    <!-- 视频列表 -->
    <div class="video-list" id="videoList"></div>

    <!-- 分页 -->
    <div class="pagination" id="pagination"></div>
    <div class="page-jump">
        <input type="number" id="pageInput" placeholder="页码">
        <button onclick="jumpToPage()">跳转</button>
    </div>
</div>

<script>
    // 从 Go 注入 videoList
    const videoList = [
    {{range .videoList}}
    {
        "GodNum": "{{.GodNum}}",
        "Name": "{{.Name}}",
        "PlayerUrl": "{{.PlayerUrl}}"
    },
    {{end}}
    ];

    const itemsPerPage = 12;
    let currentPage = 1;
    let filteredList = [...videoList]; // 搜索后的数组

    function renderList(list, page) {
        const videoContainer = document.getElementById('videoList');
        videoContainer.innerHTML = '';

        const start = (page - 1) * itemsPerPage;
        const end = page * itemsPerPage;
        const pageItems = list.slice(start, end);

        pageItems.forEach(video => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.onclick = () => playVideo(video.PlayerUrl, `${video.GodNum}-${video.Name}`);
            card.innerHTML = `
        <img class="video-thumbnail" src="https://fourhoi.com/${video.GodNum}/cover-t.jpg" alt="${video.GodNum}-${video.Name}">
        <div class="video-overlay">
          <div class="video-title">${video.GodNum}-${video.Name}</div>
        </div>
      `;
            videoContainer.appendChild(card);
        });

        renderPagination(list.length);
    }

    function renderPagination(totalItems) {
        const pagination = document.getElementById('pagination');
        pagination.innerHTML = '';

        const totalPages = Math.ceil(totalItems / itemsPerPage);
        if (totalPages <= 1) return; // 只有一页就不用显示分页

        const maxVisible = 2; // 当前页左右显示的数量

        function createButton(page, text = null, disabled = false) {
            const btn = document.createElement('button');
            btn.textContent = text || page;
            if (page === currentPage) btn.classList.add('active');
            if (disabled) {
                btn.disabled = true;
                btn.style.opacity = "0.6";
                btn.style.cursor = "not-allowed";
            } else {
                btn.onclick = () => {
                    currentPage = page;
                    renderList(filteredList, currentPage);
                };
            }
            return btn;
        }

        // 上一页 ⬅️
        pagination.appendChild(createButton(currentPage - 1, "⬅️", currentPage === 1));

        // 首页
        pagination.appendChild(createButton(1));

        // 左边省略号
        if (currentPage - maxVisible > 2) {
            const span = document.createElement('span');
            span.textContent = '...';
            span.style.margin = '0 5px';
            pagination.appendChild(span);
        }

        // 中间页码
        const start = Math.max(2, currentPage - maxVisible);
        const end = Math.min(totalPages - 1, currentPage + maxVisible);
        for (let i = start; i <= end; i++) {
            pagination.appendChild(createButton(i));
        }

        // 右边省略号
        if (currentPage + maxVisible < totalPages - 1) {
            const span = document.createElement('span');
            span.textContent = '...';
            span.style.margin = '0 5px';
            pagination.appendChild(span);
        }

        // 尾页
        if (totalPages > 1) {
            pagination.appendChild(createButton(totalPages));
        }

        // 下一页 ➡️
        pagination.appendChild(createButton(currentPage + 1, "➡️", currentPage === totalPages));
    }

    function searchVideos() {
        const term = document.getElementById('searchInput').value.toLowerCase().trim();
        const clearBtn = document.getElementById('clearBtn');
        clearBtn.style.display = term ? 'block' : 'none';

        filteredList = videoList.filter(v =>
            v.Name.toLowerCase().includes(term) || v.GodNum.toLowerCase().includes(term)
        );
        currentPage = 1;
        renderList(filteredList, currentPage);
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        filteredList = [...videoList];
        currentPage = 1;
        document.getElementById('clearBtn').style.display = 'none';
        renderList(filteredList, currentPage);
    }

    function jumpToPage() {
        const input = document.getElementById('pageInput');
        const page = parseInt(input.value);
        const totalPages = Math.ceil(filteredList.length / itemsPerPage);
        if (!isNaN(page) && page >= 1 && page <= totalPages) {
            currentPage = page;
            renderList(filteredList, currentPage);
        }
    }

    function playVideo(url, title) {
        const targetUrl = `https://oldbai.top/onlinem3u8?m3u8Url=${encodeURIComponent(url)}&proxyUrl=https://oldbai.top/m3u8`;
        window.open(targetUrl, '_blank');
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
        renderList(filteredList, currentPage);
    });
</script>
</body>
</html>
