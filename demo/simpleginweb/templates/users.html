{{define "users.html"}}
{{template "layout" .}}
{{end}}

{{define "user-main-content"}}
<div class="mb-3">
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#userModal" onclick="openCreateModal()">
        <i class="fas fa-plus me-2"></i>添加用户
    </button>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>用户名</th>
                    <th>邮箱</th>
                    <th>角色</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="userTableBody">
                {{range .users}}
                <tr>
                    <td>{{.ID}}</td>
                    <td>{{.Username}}</td>
                    <td>{{.Email}}</td>
                    <td>
                        {{if eq .Role `admin`}}
                        <span class="badge bg-danger">管理员</span>
                        {{else}}
                        <span class="badge bg-primary">用户</span>
                        {{end}}
                    </td>
                    <td>{{.CreateAt.Format `2006-01-02 15:04`}}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="editUser({{.ID}})">编辑</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteUser({{.ID}})">删除</button>
                    </td>
                </tr>
                {{end}}
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 用户模态框 -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">添加用户</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <input type="hidden" id="userId">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <div class="mb-3">
                        <label for="role" class="form-label">角色</label>
                        <select class="form-control" id="role" required>
                            <option value="user">用户</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveUser()">保存</button>
            </div>
        </div>
    </div>
</div>
{{end}}

{{define "page-js"}}
<script>
    let currentUserId = null;
    const modal = new bootstrap.Modal(document.getElementById('userModal'));

    function openCreateModal() {
        currentUserId = null;
        document.getElementById('modalTitle').textContent = '添加用户';
        document.getElementById('userForm').reset();
        document.getElementById('userId').value = '';
    }

    async function editUser(id) {
        try {
            const response = await axios.get(`/api/users/${id}`);
            const user = response.data.data;

            currentUserId = id;
            document.getElementById('modalTitle').textContent = '编辑用户';
            document.getElementById('userId').value = user.id;
            document.getElementById('username').value = user.username;
            document.getElementById('email').value = user.email;
            document.getElementById('password').value = user.password;
            document.getElementById('role').value = user.role;

            modal.show();
        } catch (error) {
            alert('获取用户信息失败');
        }
    }

    async function saveUser() {
        const form = document.getElementById('userForm');
        const formData = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            role: document.getElementById('role').value
        };

        try {
            if (currentUserId) {
                await axios.put(`/api/users/${currentUserId}`, formData);
            } else {
                await axios.post('/api/users', formData);
            }

            modal.hide();
            location.reload();
        } catch (error) {
            alert('保存失败：' + (error.response?.data?.message || '网络错误'));
        }
    }

    async function deleteUser(id) {
        if (confirm('确定要删除这个用户吗？')) {
            try {
                await axios.delete(`/api/users/${id}`);
                location.reload();
            } catch (error) {
                alert('删除失败：' + (error.response?.data?.message || '网络错误'));
            }
        }
    }
</script>
{{end}}
